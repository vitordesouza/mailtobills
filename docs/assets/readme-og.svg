<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MailToBills product overview</title>
  <desc id="desc">A marketing infographic showing invoices forwarded by email, organized by month, and exported for an accountant.</desc>
  <defs>
    <linearGradient id="heroWash" x1="139" x2="1086" y1="44" y2="603" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F6EF"/>
      <stop offset="0.52" stop-color="#EEF5ED"/>
      <stop offset="1" stop-color="#F4F1EA"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="matrix(368 0 0 224 778 197)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DCEBDD"/>
      <stop offset="1" stop-color="#DCEBDD" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1E2A23" flood-opacity="0.13"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1E2A23" flood-opacity="0.1"/>
    </filter>
    <pattern id="ledger" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#E4DFD4" stroke-width="1"/>
    </pattern>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", "Roboto Mono", ui-monospace, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" rx="34" fill="url(#heroWash)"/>
  <rect width="1200" height="630" rx="34" fill="url(#ledger)" opacity="0.36"/>
  <rect width="1200" height="630" rx="34" fill="url(#glow)"/>
  <rect x="28" y="28" width="1144" height="574" rx="26" stroke="#DED8CC" stroke-width="2"/>

  <g transform="translate(78 70)">
    <g>
      <rect width="38" height="38" rx="11" fill="#2F684D"/>
      <path d="M11.5 15L19 9.5L26.5 15V25L19 30.5L11.5 25V15Z" stroke="#F7F3EA" stroke-width="2.2" stroke-linejoin="round"/>
