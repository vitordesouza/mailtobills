    </g>
    <text x="52" y="24" class="sans" fill="#223027" font-size="24" font-weight="800">MailToBills</text>
    <text x="0" y="84" class="mono" fill="#557264" font-size="15" font-weight="700" letter-spacing="1.8">EMAIL-FIRST EXPENSE COLLECTION</text>
    <text x="0" y="142" class="sans" fill="#1F2420" font-size="57" font-weight="850" letter-spacing="-1.4">Forward invoices.</text>
    <text x="0" y="204" class="sans" fill="#1F2420" font-size="57" font-weight="850" letter-spacing="-1.4">Get organized exports.</text>
    <text x="0" y="252" class="sans" fill="#667067" font-size="22" font-weight="500">MailToBills turns forwarded invoice emails into</text>
    <text x="0" y="282" class="sans" fill="#667067" font-size="22" font-weight="500">monthly PDF collections your accountant can use.</text>
  </g>

