      <rect width="342" height="42" rx="13" fill="#FFFFFF" stroke="#E3DCCE"/>
      <circle cx="22" cy="21" r="13" fill="#F5F1E8" stroke="#DED7CA"/>
      <text x="18" y="26" class="mono" fill="#49524A" font-size="12" font-weight="900">B</text>
      <path d="M54 16H176" stroke="#BDB5A7" stroke-width="5" stroke-linecap="round"/>
      <path d="M54 27H148" stroke="#DED7CA" stroke-width="4" stroke-linecap="round"/>
