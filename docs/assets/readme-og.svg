      <circle cx="22" cy="21" r="13" fill="#F5F1E8" stroke="#DED7CA"/>
      <text x="18" y="26" class="mono" fill="#49524A" font-size="12" font-weight="900">A</text>
      <path d="M54 16H184" stroke="#BDB5A7" stroke-width="5" stroke-linecap="round"/>
      <path d="M54 27H136" stroke="#DED7CA" stroke-width="4" stroke-linecap="round"/>
      <rect x="204" y="11" width="58" height="20" rx="10" fill="#F0E4C3"/>
      <text x="218" y="25" class="mono" fill="#8B6B20" font-size="9" font-weight="900">PRIMARY</text>
      <text x="290" y="26" class="mono" fill="#81877F" font-size="11" font-weight="800">MAY 12</text>
    </g>
